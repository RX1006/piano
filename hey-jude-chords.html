<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hey Jude — Piano Chords</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0d10;
  --surface: #14151a;
  --card: #1c1d25;
  --border: #2a2b38;
  --accent: #e8b84b;
  --accent2: #6b8cff;
  --red: #ff6b6b;
  --white: #f0ede6;
  --muted: #666;
  --active-section: rgba(232, 184, 75, 0.06);
}

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  padding: 2rem 1rem 5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Header ── */
header {
  text-align: center;
  margin-bottom: 2.5rem;
}

.song-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.2rem, 7vw, 4rem);
  letter-spacing: -0.02em;
  color: var(--white);
  line-height: 1;
}

.song-artist {
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-top: 0.4rem;
}

.song-meta {
  font-size: 0.65rem;
  color: var(--muted);
  margin-top: 0.3rem;
  letter-spacing: 0.1em;
}

/* ── Piano (sticky at top) ── */
.piano-sticky {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg);
  padding: 1rem 0 1.2rem;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
}

.current-chord-label {
  font-family: 'Playfair Display', serif;
  font-size: 2.2rem;
  color: var(--accent);
  margin-bottom: 0.6rem;
  min-height: 2.6rem;
  transition: opacity 0.2s;
}

.current-chord-notes {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 0.8rem;
  min-height: 1.5rem;
  flex-wrap: wrap;
  justify-content: center;
}

.note-tag {
  background: rgba(232, 184, 75, 0.1);
  border: 1px solid rgba(232, 184, 75, 0.3);
  border-radius: 100px;
  padding: 0.2rem 0.7rem;
  font-size: 0.72rem;
  color: var(--accent);
}

.note-tag.root {
  background: rgba(232, 184, 75, 0.2);
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 500;
}

/* Piano — scales to full container width */
.piano-scaler {
  width: 100%;
  overflow: hidden;
}

.piano {
  position: relative;
  display: flex;
  /* height and width set by JS based on key size */
  filter: drop-shadow(0 10px 40px rgba(0,0,0,0.8));
  transform-origin: top left;
}

.white-keys { display: flex; position: relative; }

.key-w {
  /* width/height set by JS */
  background: #f0ece2;
  border: 1px solid #bbb;
  border-radius: 0 0 6px 6px;
  cursor: pointer;
  position: relative;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 7px;
  font-size: 0.6rem;
  color: #aaa;
  transition: background 0.15s;
  flex-shrink: 0;
}

.key-w:hover { background: #e0dcd2; }

.key-w.active {
  background: var(--accent) !important;
  color: #4a3000;
}

.black-keys { position: absolute; top: 0; left: 0; }

.key-b {
  /* width/height/left set by JS */
  background: #181820;
  border-radius: 0 0 5px 5px;
  cursor: pointer;
  position: absolute;
  top: 0;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 5px;
  font-size: 0.55rem;
  color: #444;
  pointer-events: all;
  transition: background 0.15s;
  z-index: 2;
  border: 1px solid #0a0a12;
}

.key-b:hover { background: #252530; }
.key-b.active {
  background: #c09020 !important;
  color: #3a2000;
}

/* ── Song Sheet ── */
.song-sheet {
  max-width: 700px;
  width: 100%;
}

.section {
  margin-bottom: 2.5rem;
  border-radius: 12px;
  overflow: hidden;
}

.section-header {
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 0.5rem 0;
  margin-bottom: 0.8rem;
  border-bottom: 1px solid var(--border);
}

.line {
  display: flex;
  flex-direction: column;
  margin-bottom: 1.2rem;
  gap: 0.2rem;
}

.chord-row {
  display: flex;
  gap: 0;
  flex-wrap: wrap;
}

.chord-segment {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  cursor: pointer;
  padding: 0.3rem 0.5rem 0.3rem 0;
  border-radius: 6px;
  transition: background 0.15s;
}

.chord-segment:hover { background: rgba(232, 184, 75, 0.07); }
.chord-segment.selected { background: rgba(232, 184, 75, 0.12); }

.chord-tag {
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--accent);
  white-space: nowrap;
  margin-bottom: 0.15rem;
  font-family: 'DM Mono', monospace;
}

.chord-tag.empty { color: transparent; }

.lyric-text {
  font-size: 0.85rem;
  color: var(--white);
  white-space: nowrap;
  font-family: 'Playfair Display', serif;
  font-style: italic;
}

.lyric-text.muted { color: var(--muted); }

/* Play controls */
.controls {
  display: flex;
  gap: 0.8rem;
  margin-bottom: 1.5rem;
  justify-content: center;
  flex-wrap: wrap;
}

.btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--white);
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  padding: 0.5rem 1.2rem;
  border-radius: 100px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
}

.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn:active { transform: scale(0.97); }

.btn.primary {
  background: var(--accent);
  color: #1a0e00;
  border-color: var(--accent);
}

.btn.primary:hover { background: #d4a63e; color: #1a0e00; }
</style>
</head>
<body>

<header>
  <div class="song-title">Hey Jude</div>
  <div class="song-artist">The Beatles · 1968</div>
  <div class="song-meta">Key of F Major · click any chord to see it on the piano</div>
</header>

<!-- Controls -->
<div class="controls">
  <button class="btn primary" id="playBtn">▶ Play Chord</button>
  <button class="btn" id="prevBtn">← Prev</button>
  <button class="btn" id="nextBtn">Next →</button>
</div>

<!-- Sticky Piano -->
<div class="piano-sticky">
  <div class="current-chord-label" id="chordLabel">F</div>
  <div class="current-chord-notes" id="chordNotes"></div>
  <div class="piano-scaler" id="pianoScaler">
    <div class="piano" id="piano">
      <div class="white-keys" id="whiteKeys"></div>
      <div class="black-keys" id="blackKeys"></div>
    </div>
  </div>
</div>

<!-- Song Sheet -->
<div class="song-sheet" id="songSheet"></div>

<script>
// ── Music Data ────────────────────────────────────────────────────
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

// Chord definitions: intervals in semitones from root
const CHORD_DEFS = {
  'F':    { intervals:[0,4,7],        label:'F' },
  'C':    { intervals:[0,4,7],        label:'C' },
  'C7':   { intervals:[0,4,7,10],     label:'C7' },
  'Bb':   { intervals:[0,4,7],        label:'Bb' },   // Bb = A# root
  'F7':   { intervals:[0,4,7,10],     label:'F7' },
  'Gm':   { intervals:[0,3,7],        label:'Gm' },
  'Eb':   { intervals:[0,4,7],        label:'Eb' },
};

// Root notes in MIDI (C4=60)
const ROOT_MIDI = {
  'C': 60, 'C#': 61, 'D': 62, 'D#': 63, 'E': 64, 'F': 65,
  'F#': 66, 'G': 67, 'G#': 68, 'A': 69, 'A#': 70, 'B': 71,
  'Bb': 70
};

function chordMidis(name) {
  // Parse chord name to get root + quality
  let root, quality;
  if (name.startsWith('Bb')) { root = 'Bb'; quality = name.slice(2); }
  else if (name.startsWith('Eb')) { root = 'Eb'; quality = name.slice(2); }
  else if (name[1] === '#' || name[1] === 'b') { root = name.slice(0,2); quality = name.slice(2); }
  else { root = name[0]; quality = name.slice(1); }

  const rootM = ROOT_MIDI[root] ?? 65;
  let intervals;
  if (quality === '' || quality === 'maj') intervals = [0,4,7];
  else if (quality === 'm' || quality === 'min') intervals = [0,3,7];
  else if (quality === '7') intervals = [0,4,7,10];
  else if (quality === 'maj7') intervals = [0,4,7,11];
  else if (quality === 'm7') intervals = [0,3,7,10];
  else intervals = [0,4,7];

  return intervals.map(i => rootM + i);
}

function midiNoteName(midi) { return NOTES[midi % 12]; }
function midiToFreq(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }

// ── Song Data ─────────────────────────────────────────────────────
const SONG = [
  {
    section: 'Verse 1 & 2',
    lines: [
      { segments: [
        { chord: 'F', lyric: 'Hey Jude, ' },
        { chord: 'C', lyric: "don't make it bad, " },
        { chord: 'C7', lyric: 'take a sad song ' },
        { chord: 'F', lyric: 'and make it better' },
      ]},
      { segments: [
        { chord: 'Bb', lyric: 'Remember to let her ' },
        { chord: 'F', lyric: 'into your heart, ' },
        { chord: 'C', lyric: 'then you can start ' },
        { chord: 'F', lyric: 'to make it better' },
      ]},
      { segments: [
        { chord: 'F', lyric: 'Hey Jude, ' },
        { chord: 'C', lyric: "don't be afraid, " },
        { chord: 'C7', lyric: 'you were made ' },
        { chord: 'F', lyric: 'to go out and get her' },
      ]},
      { segments: [
        { chord: 'Bb', lyric: 'The minute you let her ' },
        { chord: 'F', lyric: 'under your skin, ' },
        { chord: 'C', lyric: 'then you begin ' },
        { chord: 'F', lyric: 'to make it better' },
      ]},
    ]
  },
  {
    section: 'Chorus',
    lines: [
      { segments: [
        { chord: 'F7', lyric: 'And anytime you feel the pain, ' },
        { chord: 'Bb', lyric: 'Hey Jude, refrain,' },
      ]},
      { segments: [
        { chord: 'F', lyric: "Don't carry the world " },
        { chord: 'C', lyric: 'upon your shoulders' },
      ]},
      { segments: [
        { chord: 'F7', lyric: "For well you know that it's a fool " },
        { chord: 'Bb', lyric: 'who plays it cool,' },
      ]},
      { segments: [
        { chord: 'F', lyric: 'By making his world ' },
        { chord: 'C', lyric: 'a little colder' },
      ]},
    ]
  },
  {
    section: 'Verse 3',
    lines: [
      { segments: [
        { chord: 'F', lyric: 'Hey Jude, ' },
        { chord: 'C', lyric: "don't let me down, " },
        { chord: 'C7', lyric: 'you have found her, ' },
        { chord: 'F', lyric: 'now go and get her' },
      ]},
      { segments: [
        { chord: 'Bb', lyric: 'Remember to let her ' },
        { chord: 'F', lyric: 'into your heart, ' },
        { chord: 'C', lyric: 'then you can start ' },
        { chord: 'F', lyric: 'to make it better' },
      ]},
    ]
  },
  {
    section: 'Outro (repeat)',
    lines: [
      { segments: [
        { chord: 'F', lyric: 'Na na na ' },
        { chord: 'Eb', lyric: 'na na na na, ' },
        { chord: 'Bb', lyric: 'na na na na, ' },
        { chord: 'F', lyric: 'Hey Jude' },
      ]},
    ]
  },
];

// ── Build flat chord list for prev/next nav ───────────────────────
const allSegments = []; // {chord, el}

// ── Piano Build (responsive) ──────────────────────────────────────
const NUM_WHITE = 8; // C D E F G A B C
const WHITE_NOTES = ['C','D','E','F','G','A','B','C'];
const WHITE_MIDI  = [60,62,64,65,67,69,71,72];

// Black key positions as fraction of white key width from left edge of piano
// Position = (whiteKeyIndex + offset) * keyW - blackKeyW/2
// C#=between C(0)&D(1), D#=between D(1)&E(2), F#=between F(3)&G(4), G#=between G(4)&A(5), A#=between A(5)&B(6)
const BLACK_META = [
  { note:'C#', midi:61, afterWhite:0 },
  { note:'D#', midi:63, afterWhite:1 },
  { note:'F#', midi:66, afterWhite:3 },
  { note:'G#', midi:68, afterWhite:4 },
  { note:'A#', midi:70, afterWhite:5 },
];

const wkEl = document.getElementById('whiteKeys');
const bkEl = document.getElementById('blackKeys');
const pianoEl = document.getElementById('piano');
const scalerEl = document.getElementById('pianoScaler');

function buildPiano() {
  wkEl.innerHTML = '';
  bkEl.innerHTML = '';

  const containerW = scalerEl.offsetWidth || window.innerWidth - 32;
  const keyW = Math.floor(containerW / NUM_WHITE);
  const keyH = Math.round(keyW * 3.2);
  const bKeyW = Math.round(keyW * 0.62);
  const bKeyH = Math.round(keyH * 0.62);

  pianoEl.style.width = (keyW * NUM_WHITE) + 'px';
  pianoEl.style.height = keyH + 'px';

  WHITE_NOTES.forEach((n, i) => {
    const k = document.createElement('div');
    k.className = 'key-w';
    k.style.width = keyW + 'px';
    k.style.height = keyH + 'px';
    k.dataset.midi = WHITE_MIDI[i];
    k.dataset.note = n;
    k.textContent = n;
    k.style.fontSize = Math.max(9, keyW * 0.18) + 'px';
    wkEl.appendChild(k);
  });

  BLACK_META.forEach(d => {
    const k = document.createElement('div');
    k.className = 'key-b';
    k.style.width = bKeyW + 'px';
    k.style.height = bKeyH + 'px';
    // Center black key between the two adjacent white keys
    const leftPos = Math.round((d.afterWhite + 1) * keyW - bKeyW / 2);
    k.style.left = leftPos + 'px';
    k.dataset.midi = d.midi;
    k.dataset.note = d.note;
    k.textContent = d.note;
    k.style.fontSize = Math.max(8, bKeyW * 0.22) + 'px';
    bkEl.appendChild(k);
  });
}

// ── Highlight Piano ───────────────────────────────────────────────
function highlightChord(chordName) {
  document.querySelectorAll('.key-w,.key-b').forEach(k=>k.classList.remove('active'));
  const midis = chordMidis(chordName);
  midis.forEach(m=>{
    document.querySelectorAll(`[data-midi="${m}"]`).forEach(k=>k.classList.add('active'));
  });
  // Label
  document.getElementById('chordLabel').textContent = chordName;
  // Notes
  const notesEl = document.getElementById('chordNotes');
  notesEl.innerHTML = '';
  midis.forEach((m,i)=>{
    const tag = document.createElement('div');
    tag.className = 'note-tag' + (i===0?' root':'');
    tag.textContent = midiNoteName(m);
    notesEl.appendChild(tag);
  });
}

// ── Audio ─────────────────────────────────────────────────────────
let actx = null;
function getCtx(){ if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)(); return actx; }

function playNote(freq, delay=0, dur=1.4){
  const ctx=getCtx();
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type='triangle';
  osc.frequency.value=freq;
  gain.gain.setValueAtTime(0, ctx.currentTime+delay);
  gain.gain.linearRampToValueAtTime(0.25, ctx.currentTime+delay+0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+delay+dur);
  osc.start(ctx.currentTime+delay);
  osc.stop(ctx.currentTime+delay+dur);
}

function playChord(name){
  const midis=chordMidis(name);
  midis.forEach((m,i)=>playNote(midiToFreq(m), i*0.06));
}

// ── Song Sheet Build ──────────────────────────────────────────────
const sheet = document.getElementById('songSheet');
let selectedIdx = 0;

SONG.forEach(sec=>{
  const secEl = document.createElement('div');
  secEl.className = 'section';

  const hdr = document.createElement('div');
  hdr.className = 'section-header';
  hdr.textContent = sec.section;
  secEl.appendChild(hdr);

  sec.lines.forEach(line=>{
    const lineEl = document.createElement('div');
    lineEl.className = 'line';
    const row = document.createElement('div');
    row.className = 'chord-row';

    line.segments.forEach(seg=>{
      const segEl = document.createElement('div');
      segEl.className = 'chord-segment';

      const ctag = document.createElement('div');
      ctag.className = 'chord-tag';
      ctag.textContent = seg.chord;

      const lyr = document.createElement('div');
      lyr.className = 'lyric-text';
      lyr.textContent = seg.lyric;

      segEl.appendChild(ctag);
      segEl.appendChild(lyr);

      const idx = allSegments.length;
      allSegments.push({ chord: seg.chord, el: segEl });

      segEl.addEventListener('click', ()=>{ selectChord(idx); });

      row.appendChild(segEl);
    });

    lineEl.appendChild(row);
    secEl.appendChild(lineEl);
  });

  sheet.appendChild(secEl);
});

function selectChord(idx){
  // Deselect old
  if(allSegments[selectedIdx]) allSegments[selectedIdx].el.classList.remove('selected');
  selectedIdx = idx;
  allSegments[selectedIdx].el.classList.add('selected');
  highlightChord(allSegments[selectedIdx].chord);
}

// ── Controls ──────────────────────────────────────────────────────
document.getElementById('playBtn').addEventListener('click',()=>{
  playChord(allSegments[selectedIdx].chord);
});

document.getElementById('nextBtn').addEventListener('click',()=>{
  if(selectedIdx < allSegments.length-1) selectChord(selectedIdx+1);
  allSegments[selectedIdx].el.scrollIntoView({behavior:'smooth', block:'center'});
});

document.getElementById('prevBtn').addEventListener('click',()=>{
  if(selectedIdx > 0) selectChord(selectedIdx-1);
  allSegments[selectedIdx].el.scrollIntoView({behavior:'smooth', block:'center'});
});

// Keyboard shortcuts
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight') document.getElementById('nextBtn').click();
  if(e.key==='ArrowLeft')  document.getElementById('prevBtn').click();
  if(e.key===' ') { e.preventDefault(); document.getElementById('playBtn').click(); }
});

// Init
buildPiano();
selectChord(0);

window.addEventListener('resize', () => {
  buildPiano();
  highlightChord(allSegments[selectedIdx].chord);
});
</script>
</body>
</html>
